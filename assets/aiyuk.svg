<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Editorial graphic: 49ers receiver spiral">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0508"/>
      <stop offset="55%" stop-color="#3a0b12"/>
      <stop offset="100%" stop-color="#0d0f14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#aa000055"/>
      <stop offset="1" stop-color="#aa000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5c451"/>
      <stop offset="1" stop-color="#b5892a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <!-- spiral motif -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2">
    <path d="M780 340 m0 0 a20 20 0 1 1 -0.1 0 M780 340 a48 48 0 1 1 -0.1 0 M780 340 a86 86 0 1 1 -0.1 0 M780 340 a134 134 0 1 1 -0.1 0 M780 340 a190 190 0 1 1 -0.1 0"/>
  </g>
  <!-- big jersey number -->
  <text x="770" y="470" font-family="Arial Black, Arial, sans-serif" font-size="360" font-weight="900" fill="url(#gold)" fill-opacity="0.16" text-anchor="middle">11</text>
  <!-- accent bar -->
  <rect x="90" y="150" width="72" height="10" rx="5" fill="#e11d2a"/>
  <text x="90" y="235" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="#ffffff">THE AIYUK</text>
  <text x="90" y="300" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="#ffffff">SPIRAL</text>
  <text x="92" y="360" font-family="Arial, sans-serif" font-size="26" fill="#cdd2db">A 49ers success story turned strange</text>
  <text x="90" y="600" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#f5a623" letter-spacing="2">BAY AREA SPORTS BLOG &#183; COLUMN</text>
</svg>
